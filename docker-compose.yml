version: '3.8'

services:
  db:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: xingwen
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend/api
    restart: always
    environment:
      - DATABASE_URL=mysql+aiomysql://root:root@db:3306/xingwen
      - REDIS_HOST=redis
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_MODEL=${AI_MODEL}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/api/uploads:/app/uploads
    ports:
      - "8000:8000"

  h5:
    build: ./frontend/h5
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"

  admin:
    build: ./frontend/admin
    restart: always
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  mariadb_data:
